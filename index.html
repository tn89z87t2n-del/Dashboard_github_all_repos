<!DOCTYPE html>
<html lang="sk" data-theme="dark" data-mode="live">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Projects — GitHub Dashboard</title>
<meta name="description" content="Statický prehľad všetkých mojich GitHub repozitárov." />

<!-- Google Fonts: Space Grotesk (display), Inter (body), JetBrains Mono (mono) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

<style>
  /* ===== Farebné premenné — dark default ===== */
  :root {
    --bg-0: #0a0c16;
    --bg-1: #0e1124;
    --text: #e7e9f5;
    --text-dim: #9aa0bd;
    --text-faint: #6c7396;

    /* sklenený povrch */
    --glass: rgba(255, 255, 255, 0.05);
    --glass-hover: rgba(255, 255, 255, 0.08);
    --border: rgba(255, 255, 255, 0.10);
    --border-strong: rgba(255, 255, 255, 0.18);
    --shadow: rgba(0, 0, 0, 0.45);

    /* aurora bloby */
    --blob-cyan: rgba(110, 231, 249, 0.40);
    --blob-violet: rgba(167, 139, 250, 0.38);
    --blob-pink: rgba(244, 114, 182, 0.32);
    --blob-alpha: 1;

    /* akcent — závisí od módu (prepisuje sa nižšie) */
    --accent: #6ee7f9;        /* LIVE = cyan */
    --accent-soft: rgba(110, 231, 249, 0.16);
    --accent-glow: rgba(110, 231, 249, 0.30);

    --radius: 18px;
    --radius-sm: 12px;
    --maxw: 1280px;
  }

  /* ===== Light téma ===== */
  [data-theme="light"] {
    --bg-0: #eef1fb;
    --bg-1: #e6ebff;
    --text: #161a2e;
    --text-dim: #4a5170;
    --text-faint: #757c9b;

    --glass: rgba(255, 255, 255, 0.55);
    --glass-hover: rgba(255, 255, 255, 0.72);
    --border: rgba(20, 24, 60, 0.10);
    --border-strong: rgba(20, 24, 60, 0.18);
    --shadow: rgba(60, 70, 130, 0.18);

    --blob-alpha: 0.5;
  }

  /* ===== Akcent podľa módu ===== */
  [data-mode="live"] {
    --accent: #6ee7f9;
    --accent-soft: rgba(110, 231, 249, 0.16);
    --accent-glow: rgba(110, 231, 249, 0.30);
  }
  [data-mode="source"] {
    --accent: #a78bfa;
    --accent-soft: rgba(167, 139, 250, 0.18);
    --accent-glow: rgba(167, 139, 250, 0.32);
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    margin: 0;
    font-family: "Inter", system-ui, sans-serif;
    color: var(--text);
    background: var(--bg-0);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    transition: background 0.5s ease, color 0.4s ease;
  }

  /* ===== Aurora bloby na pozadí ===== */
  .aurora {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    background:
      radial-gradient(120% 120% at 50% -10%, var(--bg-1), var(--bg-0) 60%);
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(90px) saturate(130%);
    opacity: var(--blob-alpha);
    will-change: transform;
  }
  .blob.cyan   { width: 46vw; height: 46vw; left: -8vw;  top: -6vw;  background: var(--blob-cyan);   animation: drift1 26s ease-in-out infinite; }
  .blob.violet { width: 50vw; height: 50vw; right: -10vw; top: 12vh;  background: var(--blob-violet); animation: drift2 32s ease-in-out infinite; }
  .blob.pink   { width: 40vw; height: 40vw; left: 22vw;  bottom: -16vw; background: var(--blob-pink); animation: drift3 30s ease-in-out infinite; }

  @keyframes drift1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(6vw, 5vh) scale(1.12); } }
  @keyframes drift2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-7vw, 4vh) scale(0.92); } }
  @keyframes drift3 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(4vw, -6vh) scale(1.08); } }

  /* ===== Layout obal ===== */
  .wrap {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 32px 24px 72px;
  }

  /* ===== Hlavička ===== */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 34px;
  }

  .brand { display: flex; align-items: center; gap: 14px; }

  /* malý „diamant" mark */
  .mark {
    width: 34px; height: 34px;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .mark svg { width: 100%; height: 100%; }

  .brand-text { display: flex; flex-direction: column; line-height: 1.05; }
  .brand-text h1 {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: 26px;
    margin: 0;
    letter-spacing: -0.02em;
  }
  .counter {
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    color: var(--text-faint);
    margin-top: 3px;
  }

  /* ===== Pravé ovládače ===== */
  .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  /* spoločný sklenený povrch */
  .glass {
    background: var(--glass);
    border: 1px solid var(--border);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    backdrop-filter: blur(20px) saturate(140%);
  }

  .search {
    display: flex; align-items: center; gap: 8px;
    padding: 0 12px;
    height: 42px;
    border-radius: var(--radius-sm);
  }
  .search svg { width: 16px; height: 16px; color: var(--text-faint); flex-shrink: 0; }
  .search input {
    background: transparent; border: 0; outline: none;
    color: var(--text);
    font-family: "Inter", sans-serif;
    font-size: 14px;
    width: 170px;
  }
  .search input::placeholder { color: var(--text-faint); }

  /* mode-toggle pill */
  .mode-toggle {
    display: flex; align-items: center; gap: 9px;
    height: 42px;
    padding: 0 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    color: var(--text);
    transition: border-color 0.3s ease, background 0.3s ease;
  }
  .mode-toggle:hover { background: var(--glass-hover); border-color: var(--border-strong); }
  .mode-toggle .mlabel {
    font-family: "JetBrains Mono", monospace;
    font-size: 12.5px;
    font-weight: 500;
    white-space: nowrap;
  }
  .mode-toggle .gh {
    width: 19px; height: 19px;
    color: var(--accent);
    transition: color 0.4s ease;
    flex-shrink: 0;
  }
  /* indikačná bodka pri labeli */
  .mode-toggle .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
    transition: background 0.4s ease, box-shadow 0.4s ease;
  }

  .icon-btn {
    width: 42px; height: 42px;
    border-radius: var(--radius-sm);
    display: grid; place-items: center;
    cursor: pointer;
    color: var(--text);
    transition: border-color 0.3s ease, background 0.3s ease;
  }
  .icon-btn:hover { background: var(--glass-hover); border-color: var(--border-strong); }
  .icon-btn svg { width: 18px; height: 18px; }

  /* ===== Mriežka kariet ===== */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  /* ===== Karta ===== */
  .card {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 20px;
    border-radius: var(--radius);
    text-decoration: none;
    color: inherit;
    background: var(--glass);
    border: 1px solid var(--border);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    backdrop-filter: blur(20px) saturate(140%);
    overflow: hidden;
    transition: transform 0.25s ease, border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
  }
  /* akcentný gradient okraj + glow na hover */
  .card::before {
    content: "";
    position: absolute; inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(135deg, var(--accent), transparent 45%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }
  .card:hover {
    transform: translateY(-4px);
    background: var(--glass-hover);
    border-color: transparent;
    box-shadow: 0 16px 40px -12px var(--shadow), 0 0 24px -6px var(--accent-glow);
  }
  .card:hover::before { opacity: 1; }
  .card:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  .card-top {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }
  .repo-name {
    font-family: "JetBrains Mono", monospace;
    font-weight: 500;
    font-size: 15px;
    word-break: break-word;
    line-height: 1.35;
  }
  .action-icon {
    flex-shrink: 0;
    width: 30px; height: 30px;
    border-radius: 9px;
    display: grid; place-items: center;
    color: var(--accent);
    background: var(--accent-soft);
    transition: color 0.4s ease, background 0.4s ease;
  }
  .action-icon svg { width: 15px; height: 15px; }

  .desc {
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--text-dim);
    margin: 0;
    flex-grow: 1;
  }

  .meta {
    display: flex; align-items: center; gap: 14px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11.5px;
    color: var(--text-faint);
  }
  .meta .lang { display: flex; align-items: center; gap: 6px; }
  .lang-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .meta .stars { display: flex; align-items: center; gap: 4px; }
  .meta .stars svg { width: 12px; height: 12px; }

  /* prázdny stav (search bez výsledku) */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 64px 16px;
    color: var(--text-faint);
    font-family: "JetBrains Mono", monospace;
    font-size: 13px;
  }

  /* ===== Responzív ===== */
  @media (max-width: 560px) {
    .wrap { padding: 22px 16px 56px; }
    .brand-text h1 { font-size: 22px; }
    .search input { width: 120px; }
    /* na mobile skry textový label módu, nechaj len ikonu */
    .mode-toggle .mlabel { display: none; }
    .search { display: none; }
  }

  /* ===== Prístupnosť: redukovaný pohyb ===== */
  @media (prefers-reduced-motion: reduce) {
    .blob { animation: none !important; }
    * { transition: none !important; }
  }
</style>
</head>
<body>
  <!-- aurora pozadie -->
  <div class="aurora" aria-hidden="true">
    <div class="blob cyan"></div>
    <div class="blob violet"></div>
    <div class="blob pink"></div>
  </div>

  <div class="wrap">
    <header>
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <!-- diamantový mark -->
          <svg viewBox="0 0 32 32" fill="none">
            <defs>
              <linearGradient id="gmark" x1="0" y1="0" x2="32" y2="32">
                <stop offset="0" stop-color="#6ee7f9"/>
                <stop offset="1" stop-color="#a78bfa"/>
              </linearGradient>
            </defs>
            <path d="M16 2 L30 16 L16 30 L2 16 Z" fill="url(#gmark)" opacity="0.92"/>
            <path d="M16 8 L24 16 L16 24 L8 16 Z" fill="var(--bg-0)" opacity="0.55"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>Projects</h1>
          <span class="counter" id="counter">— repozitárov</span>
        </div>
      </div>

      <div class="controls">
        <!-- search -->
        <label class="search glass">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="search" type="search" placeholder="Hľadať…" aria-label="Hľadať projekt" autocomplete="off" />
        </label>

        <!-- mode toggle: LIVE ↔ SOURCE -->
        <button class="mode-toggle glass" id="modeToggle" aria-pressed="false" title="Prepnúť: Živý náhľad / Zdrojový kód">
          <span class="dot" aria-hidden="true"></span>
          <span class="mlabel" id="modeLabel">Živý náhľad</span>
          <!-- GitHub mark -->
          <svg class="gh" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .5C5.37.5 0 5.87 0 12.5c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58 0-.29-.01-1.05-.02-2.06-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.33-1.76-1.33-1.76-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.49.99.11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.34-5.47-5.95 0-1.31.47-2.39 1.24-3.23-.13-.3-.54-1.53.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6.01 0c2.29-1.55 3.3-1.23 3.3-1.23.66 1.65.25 2.88.12 3.18.77.84 1.24 1.92 1.24 3.23 0 4.62-2.81 5.64-5.49 5.94.43.37.81 1.1.81 2.22 0 1.6-.01 2.9-.01 3.29 0 .32.21.7.82.58A12.01 12.01 0 0 0 24 12.5C24 5.87 18.63.5 12 .5z"/></svg>
        </button>

        <!-- theme toggle -->
        <button class="icon-btn glass" id="themeToggle" title="Svetlý / tmavý režim" aria-label="Prepnúť tému">
          <!-- mesiac (dark) / slnko (light) sa prepína v JS -->
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
        </button>
      </div>
    </header>

    <main class="grid" id="grid"></main>
  </div>

<script>
/* ============================================================
   Dáta repozitárov — zapečené priamo do HTML (statika).
   Re-run promptu = refresh dát. Žiadne volania na API za behu.
   Poradie: najprv repá s webstránkou (web:true), potom ostatné.
   ============================================================ */
const LOGIN = "tn89z87t2n-del";
const REPOS = [
  // ——— s webstránkou (LIVE) ———
  { name: "32bit_vizualizer", web: true,
    desc: "A tiny, dependency-free tool for inspecting and editing 32-bit registers bit by bit — with live hex/decimal conversion.",
    lang: "HTML", color: "#e34c26", stars: 0 },

  { name: "Lora_Propagation_Simulator", web: true,
    desc: "Interactive LoRa radio link planning & signal propagation simulator — single index.html, vanilla JS + Canvas.",
    lang: "HTML", color: "#e34c26", stars: 0 },
  { name: "Solar_system", web: true,
    desc: "A cinematic, interactive 3D solar system in a single self-contained HTML file. No build step, no dependencies.",
    lang: "HTML", color: "#e34c26", stars: 0 },
  { name: "Fluid_simulacia", web: true,
    desc: "Interaktívna fyzikálna simulácia 100 000+ častíc v jedinom samostatnom index.html — žiadny build, žiadne závislosti.",
    lang: "HTML", color: "#e34c26", stars: 0 },
  { name: "KEE_Skuska_Otazky", web: true,
    desc: "Otázky na testík zo skúšky KEE.",
    lang: "HTML", color: "#e34c26", stars: 0 },
  { name: "Base64-Crc-Aes", web: true,
    desc: "Verifikačný nástroj pre prenos dát na MSP430FR5969 — jeden samostatný index.html (HTML+CSS+JS, žiadny build).",
    lang: "HTML", color: "#e34c26", stars: 0 },
  { name: "Test753579", web: true,
    desc: "Idk.",
    lang: "HTML", color: "#e34c26", stars: 0 },

  // ——— bez webstránky (len SOURCE) ———
  { name: "Rar_to_zip_convertor", web: false,
    desc: "A small, self-hosted Dockerized Flask web app that extracts .rar archives and re-packs them as .zip or .tar.gz.",
    lang: "Python", color: "#3572A5", stars: 0 },
  { name: "Mission_controll", web: false,
    desc: "—",
    lang: null, color: "#8a90ad", stars: 0 },
  { name: "Mission_control_dashboard_test", web: false,
    desc: "—",
    lang: null, color: "#8a90ad", stars: 0 },
  { name: "Fluid_Sim", web: false,
    desc: "—",
    lang: null, color: "#8a90ad", stars: 0 },
  { name: "Msp430", web: false,
    desc: "Nízko-energetický bezdrôtový senzor teploty a vlhkosti (MSP430FR5969 + HDC2010 + E22) s AES-128 CTR. Privátny.",
    lang: "C", color: "#555555", stars: 0 },
  { name: "Amiibo-Catalogue", web: false,
    desc: "—",
    lang: null, color: "#8a90ad", stars: 0 },
];

/* LIVE url = githack render (bez potvrdzovacieho okna, dobre zvláda relatívne assety).
   SOURCE url = github.com repo. */
function liveUrl(r)   { return "https://raw.githack.com/" + LOGIN + "/" + r.name + "/main/index.html"; }
function sourceUrl(r) { return "https://github.com/" + LOGIN + "/" + r.name; }

/* ===== SVG ikony ===== */
const ICON_EXTERNAL =
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>';
const ICON_GITHUB =
  '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.37.5 0 5.87 0 12.5c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58 0-.29-.01-1.05-.02-2.06-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.33-1.76-1.33-1.76-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.49.99.11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.34-5.47-5.95 0-1.31.47-2.39 1.24-3.23-.13-.3-.54-1.53.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6.01 0c2.29-1.55 3.3-1.23 3.3-1.23.66 1.65.25 2.88.12 3.18.77.84 1.24 1.92 1.24 3.23 0 4.62-2.81 5.64-5.49 5.94.43.37.81 1.1.81 2.22 0 1.6-.01 2.9-.01 3.29 0 .32.21.7.82.58A12.01 12.01 0 0 0 24 12.5C24 5.87 18.63.5 12 .5z"/></svg>';
const ICON_STAR =
  '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14l-5-4.87 7.1-1.01z"/></svg>';
const ICON_MOON =
  '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
const ICON_SUN =
  '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>';

/* ===== Stav ===== */
const root   = document.documentElement;
const grid   = document.getElementById("grid");
const counter= document.getElementById("counter");
const search = document.getElementById("search");

/* Escape pre bezpečné vloženie textu */
function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

/* ===== Render kariet podľa aktuálneho módu + filtra ===== */
function render() {
  const mode = root.getAttribute("data-mode");      // "live" | "source"
  const isLive = mode === "live";
  const q = search.value.trim().toLowerCase();

  // LIVE: iba web:true | SOURCE: všetky (web už sú v poli prvé)
  let list = REPOS.filter(r => isLive ? r.web : true);

  // textový filter cez názov + popis
  if (q) list = list.filter(r =>
    r.name.toLowerCase().includes(q) || (r.desc || "").toLowerCase().includes(q));

  // counter
  const total = REPOS.length;
  const shown = list.length;
  counter.textContent = isLive
    ? shown + " spustiteľných projektov"
    : total + " repozitárov";

  if (!list.length) {
    grid.innerHTML = '<div class="empty">Žiadny projekt nezodpovedá hľadaniu.</div>';
    return;
  }

  const actionIcon = isLive ? ICON_EXTERNAL : ICON_GITHUB;

  grid.innerHTML = list.map(r => {
    const href = isLive ? liveUrl(r) : sourceUrl(r);
    const langPart = r.lang
      ? '<span class="lang"><span class="lang-dot" style="background:' + r.color + '"></span>' + esc(r.lang) + '</span>'
      : '<span class="lang"><span class="lang-dot" style="background:' + r.color + '"></span>—</span>';
    return (
      '<a class="card" href="' + href + '" target="_blank" rel="noopener noreferrer">' +
        '<div class="card-top">' +
          '<span class="repo-name">' + esc(r.name) + '</span>' +
          '<span class="action-icon" aria-hidden="true">' + actionIcon + '</span>' +
        '</div>' +
        '<p class="desc">' + esc(r.desc || "—") + '</p>' +
        '<div class="meta">' +
          langPart +
          '<span class="stars">' + ICON_STAR + r.stars + '</span>' +
        '</div>' +
      '</a>'
    );
  }).join("");
}

/* ===== Mód toggle (signature prvok) ===== */
const modeToggle = document.getElementById("modeToggle");
const modeLabel  = document.getElementById("modeLabel");
function setMode(mode) {
  root.setAttribute("data-mode", mode);
  const isLive = mode === "live";
  modeLabel.textContent = isLive ? "Živý náhľad" : "Zdrojový kód";
  modeToggle.setAttribute("aria-pressed", String(!isLive));
  render();
}
modeToggle.addEventListener("click", () =>
  setMode(root.getAttribute("data-mode") === "live" ? "source" : "live"));

/* ===== Téma toggle ===== */
const themeToggle = document.getElementById("themeToggle");
const themeIcon   = document.getElementById("themeIcon");
function setTheme(theme) {
  root.setAttribute("data-theme", theme);
  // v dark zobraz mesiac, v light slnko
  themeIcon.innerHTML = theme === "dark" ? ICON_MOON : ICON_SUN;
}
themeToggle.addEventListener("click", () =>
  setTheme(root.getAttribute("data-theme") === "dark" ? "light" : "dark"));

/* ===== Search ===== */
search.addEventListener("input", render);

/* ===== Init ===== */
setTheme("dark");
setMode("live");
</script>
</body>
</html>
